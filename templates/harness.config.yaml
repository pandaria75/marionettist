project:
  name: "{{PROJECT_NAME}}"
  type: "{{PROJECT_TYPE}}"
  architecture: "{{ARCHITECTURE}}"
  primaryLanguage: "{{PRIMARY_LANGUAGE}}"

paths:
  docs: "docs"
  rules: ".aiassistant/rules"
  skills: ".agents/skills"
  task: ".task"
  knowledgeMap: "docs/project/knowledge-map.md"

taskState:
  activeTask: ".task/active.json"
  taskDirectoryPattern: ".task/<yyyy-MM-dd>/<task-slug>"
  legacyContextPackFallback: ".task/context-pack.md"

models:
  # Maps skill frontmatter model_requirement fields to profiles.
  # Skills declare: reasoning, coding, reflective, utility
  requirementMapping:
    reasoning: "think"
    coding: "build"
    reflective: "review"
    utility: "run"
  # Legacy fallback profile location.
  # Canonical source is .harness/model-profiles.yml when present.
  profiles:
    think:
      description: "Deep reasoning, planning, and gate decisions"
      default: "openai/gpt-5.5"
      fallback: "openai/gpt-5.4"
    build:
      description: "Focused coding and implementation from approved task context"
      default: "openai/gpt-5.3-codex"
      fallback: "opencode-go/glm-5.1"
    review:
      description: "Reflective, cautious, nuanced review"
      default: "opencode-go/glm-5.1"
      fallback: "deepseek/deepseek-v4-pro"
    run:
      description: "Fast utility work such as indexing and validation"
      default: "opencode-go/deepseek-v4-flash"
      fallback: "deepseek/deepseek-v4-flash"

docs:
  language: "zh-CN"
  rulesLanguage: "en"
  style: "design-and-architecture"

knowledge:
  mode: "{{KNOWLEDGE_MODE}}"
  maturity: "{{KNOWLEDGE_MATURITY}}"

validation:
  defaultCommands: []

gatePolicy:
  defaultMode: "balanced"
  finalApprovalRequired: true
  # When true, a task-local plan or task state may request a different mode
  # than defaultMode, but explicit user instructions still take precedence.
  allowTaskOverride: true

# Optional OpenCode adapter settings.
# Omit opencode.permissionMode to keep compatibility fallback behavior.
# permissionMode: default preserves current behavior.
# permissionMode: moderate|loose increases local flexibility but still keeps
# the dangerous-command baseline where OpenCode schema can express it.
# opencode:
#   commandSurface: "minimal"
#   permissionMode: "default"

riskZones: []
