# Tier policy is a project-local classification and workflow-hints file.
# It is advisory for task intake and explanation only.
# It must not replace docs/project/harness-workflow.md, gatePolicy.defaultMode,
# or any selected task-local gate policy.
#
# Parser boundary for the current MVP:
# - use plain mappings and scalar lists only
# - do not use anchors, merge keys, inline objects, or multi-document YAML
# - modelProfileHint must reference an existing profile role/name from
#   .harness/model-profiles.yml instead of embedding provider/model IDs
# - automatic cross-validation of modelProfileHint values is deferred future
#   hardening; explain uncertainty rather than embedding raw provider/model IDs
# - project-local changes that tighten or add guidance are treated as refinements
# - project-local changes that replace wording or hints are surfaced as overrides/conflicts
# - attempted risk downgrades fall back to framework defaults with explanation; they are not silent
# - stricter rejection of unknown ordered-field values is deferred future hardening

schemaVersion: "1"

tiers:
  S:
    description: "Minor, low-risk work with clear scope and no boundary ambiguity"
    matchRules:
      - "single low-risk change"
      - "clear scope with no workflow impact"
    minTier: null
    maxTier: "S"
    workflowHint: "direct"
    gateHint: "default"
    reviewLevel: "standard"
    modelProfileHint: "build"

  M:
    description: "Standard work that needs analysis context before coding"
    matchRules:
      - "small feature, bugfix, refactor, or docs task with non-trivial risk"
      - "clear scope but more than trivial complexity"
    minTier: "M"
    maxTier: "M"
    workflowHint: "analysis-context"
    gateHint: "default"
    reviewLevel: "standard"
    modelProfileHint: "build"

  L:
    description: "Complex, cross-cutting, boundary-sensitive, or high-risk work"
    matchRules:
      - "multi-area or workflow-sensitive change"
      - "architecture-sensitive or approval-sensitive work"
    minTier: "L"
    maxTier: null
    workflowHint: "full-harness"
    gateHint: "prefer-strict"
    reviewLevel: "critic-required"
    modelProfileHint: "think"
