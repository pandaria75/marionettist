# Tier policy is a project-local classification and workflow-hints file.
# It is advisory for task intake and explanation only.
# It must not replace docs/project/marionettist-workflow.md, gatePolicy.defaultMode,
# or any selected task-local gate policy.
#
# Parser boundary for the current MVP:
# - use plain mappings and scalar lists only
# - do not use anchors, merge keys, inline objects, or multi-document YAML
# - modelProfileHint must reference an existing profile role/name from
#   .marionettist/model-profiles.yml instead of embedding provider/model IDs
# - automatic cross-validation of modelProfileHint values is deferred future
#   hardening; explain uncertainty rather than embedding raw provider/model IDs
# - project-local changes that tighten or add guidance are treated as refinements
# - project-local changes that replace wording or hints are surfaced as overrides/conflicts
# - attempted risk downgrades fall back to framework defaults with explanation; they are not silent
# - stricter rejection of unknown ordered-field values is deferred future hardening

schemaVersion: "1"

tiers:
  S:
    description: "Clearly scoped localized low-risk work with no boundary ambiguity"
    matchRules:
      - "single or very small localized low-risk change"
      - "typo, comment, docs-only correction, small test/example update, or harmless config text change"
      - "clear scope with no workflow, compatibility, security, production, or boundary impact"
    minTier: null
    maxTier: "S"
    workflowHint: "direct"
    gateHint: "default"
    reviewLevel: "standard"
    modelProfileHint: "build"

  M:
    description: "Standard clear-scope work that benefits from analysis context before coding"
    matchRules:
      - "small or medium feature, bugfix, refactor, docs, or config task with clear scope"
      - "more than trivial complexity but no real boundary ambiguity or sensitive production/security/compatibility impact"
    minTier: "M"
    maxTier: "M"
    workflowHint: "analysis-context"
    gateHint: "default"
    reviewLevel: "standard"
    modelProfileHint: "build"

  L:
    description: "Complex, cross-cutting, boundary-sensitive, or concretely high-risk work"
    matchRules:
      - "multi-area or cross-boundary workflow-sensitive change"
      - "architecture-sensitive, security-sensitive, production-sensitive, compatibility-sensitive, or approval-sensitive work"
      - "unclear ownership or real boundary ambiguity"
    minTier: "L"
    maxTier: null
    workflowHint: "full-marionettist"
    gateHint: "prefer-strict"
    reviewLevel: "critic-required"
    modelProfileHint: "think"
